name: Build & Release

on:
  # 每次 push 到 main 分支自动构建 debug APK
  push:
    branches: [main]
  # 打 tag 自动构建 release APK 并发布
    tags:
      - 'v*'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS_VERSION: 34.0.0
  ANDROID_SDK_CHANNEL: 0   # 0=stable

jobs:
  # ── Debug 构建 ──────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          validate-wrappers: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Release 构建 ─────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          validate-wrappers: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode signing keystore
        if: env.ANDROID_SIGNING_STORE_FILE != ''
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2.4
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ secrets.ANDROID_SIGNING_STORE_FILE }}
        with:
          fileName: signing.jks
          fileDir: app
          encodedString: ${{ env.ANDROID_SIGNING_STORE_FILE }}

      - name: Create signing.properties
        if: env.ANDROID_SIGNING_STORE_FILE != ''
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ secrets.ANDROID_SIGNING_STORE_FILE }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
        run: |
          {
            echo "storeFile=signing.jks"
            echo "storePassword=$ANDROID_SIGNING_STORE_PASSWORD"
            echo "keyAlias=$ANDROID_SIGNING_KEY_ALIAS"
            echo "keyPassword=$ANDROID_SIGNING_KEY_PASSWORD"
          } > app/signing.properties

      - name: Build release APK
        run: gradle assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ── 发布 GitHub Release ─────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release/

      - name: Prepare changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "## $TAG" > changelog.md
          echo "" >> changelog.md
          git log --oneline "v0.0.0".."$TAG" >> changelog.md 2>/dev/null || echo "(无提交记录)" >> changelog.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: ${{ github.ref }}
          body_path: changelog.md
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
